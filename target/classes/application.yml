spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ecommerce_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: c3VwZXJzZWNyZXRrZXlzdXBlcnNlY3JldGtleXN1cGVyc2VjcmV0a2V5
  expiration: 86400000
  
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE