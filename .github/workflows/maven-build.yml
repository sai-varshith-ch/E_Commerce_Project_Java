name: Java CI with Maven (E-commerce Monolith)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # We use 'clean install' to ensure all Lombok annotations are processed 
      # and the jar is properly packaged.
      run: mvn -B clean install --file pom.xml

    - name: Verify Dockerfile
      # This ensures your Dockerfile can successfully pick up the 0.0.1-SNAPSHOT jar
      run: docker build . --file Dockerfile
